<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa - Executive AI Coach</title>
    <meta name="description" content="An AI-powered executive leadership coach for corporate professionals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <img src="/static/we-ace-logo.png" alt="We-Ace Logo" class="logo-icon" style="height:20px; width:auto; vertical-align:middle; margin-right:12px;" />
                <div style="display: flex; flex-direction: column; align-items: flex-start;">
                    <h1 style="margin-bottom: 0;">Nexa</h1>
                    <span class="subtitle-foot">Executive AI Coach</span>
                </div>
            </div>
            <div class="status-indicator">
                <span class="dot pulse"></span>
                <span>Online</span>
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message-wrapper assistant">
                <div class="avatar assistant-avatar">NX</div>
                <div class="message assistant-message">
                    Welcome to your Executive Leadership Coaching Session. I'm Nexa, here to help you navigate complex professional challenges, enhance your leadership skills, and drive strategic impact. What would you like to focus on today?
                </div>
            </div>
        </main>

        <footer class="input-container">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required />
                <button type="submit" id="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>
    
    <!-- Load marked.js to render markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
