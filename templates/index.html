<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa - Executive AI Coach</title>
    <meta name="description" content="An AI-powered executive leadership coach for corporate professionals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Login overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <img src="/static/we-ace-logo.png" alt="We-Ace Logo" class="login-logo" />
            <h2>Welcome to Nexa</h2>
            <p class="login-subtitle">Sign in to start your coaching session</p>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email address" autocomplete="email" required />
                <div class="password-field">
                    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
                    <button type="button" id="toggle-password" class="toggle-password" aria-label="Show password">
                        <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eye-off-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <button type="submit" id="login-button">Sign In</button>
            </form>
            <p id="login-error" class="login-error"></p>
        </div>
    </div>

    <!-- Main app (hidden until logged in) -->
    <div class="app-container" id="app-container" style="display:none;">
        <header class="app-header" style="display: flex; align-items: center; justify-content: space-between;">
            <div class="logo" style="flex: 1; display: flex; align-items: center;">
                <img src="/static/we-ace-logo.png" alt="We-Ace Logo" class="logo-icon" style="height:20px; width:auto; vertical-align:middle; margin-right:12px;" />
            </div>
            <div style="flex: 2; display: flex; flex-direction: row; align-items: baseline; justify-content: center;">
                <h1 style="margin-bottom: 0; margin-right: 8px;">Nexa</h1>
                <span class="subtitle-foot-inline">AI Coach</span>
            </div>
            <div class="header-right" style="flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
                <span class="dot pulse"></span>
                <div class="user-chip" id="user-chip">
                    <div class="user-chip-avatar" id="header-avatar"></div>
                    <span id="user-display" class="user-display"></span>
                    <button id="logout-button" class="logout-btn">Logout</button>
                </div>
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message-wrapper assistant">
                <div class="avatar assistant-avatar">NX</div>
                <div class="message assistant-message" id="welcome-text">
                    Welcome to your Executive Leadership Coaching Session. I'm Nexa, here to help you navigate complex professional challenges, enhance your leadership skills, and drive strategic impact. What would you like to focus on today?
                </div>
            </div>
        </main>

        <footer class="input-container">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required />
                <button type="submit" id="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
